
# ISM 6562 — Week 9: Spark Distributed Transformation
# Standalone Spark cluster with Jupyter for interactive PySpark development
#
# Services:
#   spark-master   — Spark master node (coordinates workers)
#   spark-worker-1 — First Spark worker (2 cores, 2 GB)
#   spark-worker-2 — Second Spark worker (enables parallelism demos)
#   jupyter        — PySpark notebook server pre-configured to connect to cluster
#
# Usage:
#   docker compose up -d
#   Open http://localhost:8888?token=spark for Jupyter
#   Open http://localhost:8080 for Spark Master UI

services:
  # ===========================
  # Spark Master
  # ===========================
  # Coordinates the cluster: assigns tasks to workers, tracks resources.
  # Web UI at port 8080 shows cluster state, running applications, and workers.

  spark-master:
    # Custom Spark image: apache/spark:3.5.0 with a jovyan user (uid 1000)
    # added so the master/workers can run at the same uid as the jupyter
    # driver. Without uid alignment, the driver creates output directories
    # the workers cannot write inside (Mkdirs failed: Permission denied),
    # because each image's /etc/passwd has only its own native user and
    # Hadoop's UGI security manager refuses to start if the running uid has
    # no passwd entry. Building locally takes <10s on first compose-up.
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    image: ism6562/spark-jovyan:3.5.0
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC port (workers + drivers connect here)
      - "4040:4040"   # Spark Application UI (active while a job runs)
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      # IMPORTANT: data + notebooks are mounted at the SAME paths used inside
      # the jupyter container (/home/jovyan/data and /home/jovyan/notebooks).
      # When the driver runs in jupyter and the executors run on the workers,
      # every container must see local file paths at the same location, or
      # spark.read on a local file will succeed lazily and then fail with
      # FileNotFoundError when an action runs on the workers.
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - spark-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================
  # Spark Worker 1
  # ===========================
  # Executes tasks assigned by the master. Configured with 2 cores and 2 GB RAM
  # so students can observe parallel task execution without overwhelming laptops.

  spark-worker-1:
    image: ism6562/spark-jovyan:3.5.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"   # Worker 1 Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - spark-worker-1-data:/opt/spark/work-dir
      # Mount the lab data at the SAME path the jupyter driver uses, so that
      # when the driver issues spark.read("/home/jovyan/data/...") the
      # executors here can resolve the same path.
      - ./data:/home/jovyan/data
    networks:
      - spark-network
    depends_on:
      spark-master:
        condition: service_healthy

  # ===========================
  # Spark Worker 2
  # ===========================
  # Second worker enables students to see how Spark distributes partitions
  # across multiple machines. Identical resource config to Worker 1.

  spark-worker-2:
    image: ism6562/spark-jovyan:3.5.0
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8082:8081"   # Worker 2 Web UI (mapped to 8082 on host to avoid conflict)
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - spark-worker-2-data:/opt/spark/work-dir
      # Same reasoning as worker-1: mount lab data at the jupyter-side path.
      - ./data:/home/jovyan/data
    networks:
      - spark-network
    depends_on:
      spark-master:
        condition: service_healthy

  # ===========================
  # Jupyter PySpark Notebook
  # ===========================
  # Pre-configured PySpark environment. Students open notebooks, create a
  # SparkSession pointing at spark://spark-master:7077, and run transformations
  # that execute across the two workers.
  #
  # Access: http://localhost:8888?token=spark

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-jupyter
    hostname: spark-jupyter
    ports:
      - "8888:8888"   # Jupyter Notebook UI
    environment:
      - JUPYTER_TOKEN=spark
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - jupyter-data:/home/jovyan/work
    networks:
      - spark-network
    depends_on:
      spark-master:
        condition: service_healthy

# ===========================
# Network
# ===========================
# Dedicated bridge network isolates the Spark cluster from other Docker services.

networks:
  spark-network:
    driver: bridge

# ===========================
# Named Volumes
# ===========================
# Persist worker scratch space and Jupyter user data across restarts.

volumes:
  spark-worker-1-data:
  spark-worker-2-data:
  jupyter-data:
