
# ISM 6562 — Week 10: Streaming Data & Real-Time Pipelines
# Kafka + Spark Structured Streaming for real-time event processing
#
# Services:
#   zookeeper    — Kafka cluster coordination (required by Kafka broker)
#   kafka        — Message broker: ingests streaming events from producers
#   spark-master — Spark master node (coordinates Structured Streaming jobs)
#   spark-worker — Spark worker (executes streaming micro-batch tasks)
#   jupyter      — PySpark notebook with kafka-python for producing/consuming events
#
# Usage:
#   docker compose up -d
#   Open http://localhost:8888?token=spark  for Jupyter
#   Open http://localhost:8080              for Spark Master UI
#   Open http://localhost:8088              for Kafka UI (topics, partitions, lag)
#
# Memory footprint (tuned for 8 GB laptops via mem_limit + JVM heap caps):
#   zookeeper:     ~512 MB     kafka:       ~1 GB
#   spark-master:  ~512 MB     spark-worker:~2.5 GB (2 GB heap + overhead)
#   jupyter:       ~2 GB       kafka-ui:    ~512 MB
#   Total hard cap: ~7 GB
#
# Architecture:
#   Producer (Jupyter) → Kafka topic → Spark Structured Streaming → Output sink

services:
  # ===========================
  # Zookeeper
  # ===========================
  # Manages Kafka broker metadata, leader election, and cluster coordination.
  # Kafka 3.x still uses Zookeeper by default (KRaft mode is opt-in).
  # Port 2181 is the standard Zookeeper client port.

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"   # Zookeeper client port
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Whitelist the 4-letter-word commands so the healthcheck below
      # (echo ruok | nc) is allowed. Zookeeper 3.5+ refuses 4LW commands
      # by default and the healthcheck would silently fail without this.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,conf,mntr"
      # Cap Zookeeper's JVM heap. Defaults to 1 GB, way more than a
      # classroom cluster needs.
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms384m"
    mem_limit: 512m
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ===========================
  # Kafka Broker
  # ===========================
  # The central message bus. Producers write events to topics; Spark Structured
  # Streaming reads them as an unbounded DataFrame.
  #
  # Two listener endpoints:
  #   - INTERNAL (kafka:9092)      — used by Spark/Jupyter containers on the Docker network
  #   - EXTERNAL (localhost:29092) — used by tools running on the host machine
  #
  # Key settings:
  #   - auto.create.topics.enable=true  — topics are created on first produce (convenient for labs)
  #   - num.partitions=3                — students can observe parallel consumption across partitions
  #   - log.retention.hours=168         — 7-day retention so data persists across lab sessions

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"     # Internal listener (also accessible from host for convenience)
      - "29092:29092"   # External listener for host-based tools
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168          # 7 days
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Kafka's default heap is 1 GB; classroom workloads fit in ~512 MB.
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    mem_limit: 1g
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - streaming-network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 40s

  # ===========================
  # Spark Master
  # ===========================
  # Coordinates the Spark cluster. Structured Streaming jobs submitted from
  # Jupyter connect here and are distributed to workers.
  # Web UI at port 8080 shows running streaming queries and worker status.

  spark-master:
    # Custom Spark image: apache/spark:3.5.0 with a jovyan user (uid 1000)
    # added so the master/workers can run at the same uid as the jupyter
    # driver. Without uid alignment, the driver creates output directories
    # the workers cannot write inside (Mkdirs failed: Permission denied),
    # because each image's /etc/passwd has only its own native user and
    # Hadoop's UGI security manager refuses to start if the running uid has
    # no passwd entry. Building locally takes <10s on first compose-up.
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    image: ism6562/spark-jovyan:3.5.0
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC port (workers + drivers connect here)
      # NOTE: port 4040 (Spark Application UI) is published from the jupyter
      # service, not here. PySpark in Jupyter uses client deploy mode, so the
      # driver — and therefore the Application UI — runs inside the jupyter
      # container, not on the master.
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      # Cap the master's JVM heap — the master is a coordinator, not a worker.
      - SPARK_DAEMON_MEMORY=256m
    mem_limit: 512m
    volumes:
      # Mount lab data + notebooks at the SAME paths the jupyter container
      # uses (/home/jovyan/data, /home/jovyan/notebooks). The driver runs in
      # jupyter and the executors run on the workers; every container must
      # see the same local paths or spark.read on a local file will succeed
      # lazily and then fail with FileNotFoundError when an action runs.
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================
  # Spark Worker
  # ===========================
  # Executes streaming micro-batch tasks assigned by the master.
  # Configured with 2 cores and 2 GB RAM — enough for lab workloads
  # without overwhelming student laptops.

  spark-worker:
    image: ism6562/spark-jovyan:3.5.0
    container_name: spark-worker
    hostname: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"   # Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    mem_limit: 2560m
    volumes:
      - spark-worker-data:/opt/spark/work-dir
      # Mount lab data at the same path the jupyter driver uses.
      - ./data:/home/jovyan/data
    networks:
      - streaming-network
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================
  # Jupyter PySpark Notebook
  # ===========================
  # Pre-configured PySpark environment with kafka-python installed at startup.
  # Students use this to:
  #   1. Produce sample events to Kafka topics (kafka-python)
  #   2. Create Spark Structured Streaming queries that read from those topics
  #   3. Apply transformations, windowed aggregations, and write to output sinks
  #
  # Access: http://localhost:8888?token=spark
  #
  # The --packages flag adds the Spark-Kafka connector JAR so that
  # spark.readStream.format("kafka") works out of the box.

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: streaming-jupyter
    hostname: streaming-jupyter
    ports:
      - "8888:8888"   # Jupyter Notebook UI
      - "4040:4040"   # Spark Application UI (driver runs here in client mode)
      - "4041:4041"   # Fallback Application UI port if 4040 is taken
    environment:
      - JUPYTER_TOKEN=spark
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 --master spark://spark-master:7077 pyspark-shell
    command: >
      bash -c "pip install kafka-python &&
               start-notebook.sh --NotebookApp.token='spark'"
    mem_limit: 2g
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - jupyter-data:/home/jovyan/work
    networks:
      - streaming-network
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================
  # Kafka UI
  # ===========================
  # Browser-based UI for inspecting topics, partitions, messages, and
  # consumer-group offsets/lag. Provectus Kafka UI is the community go-to
  # — lightweight, one container, no login required for a lab.
  #
  # Access: http://localhost:8088
  #
  # Port 8088 because 8080 is already taken by Spark Master.

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    mem_limit: 512m
    networks:
      - streaming-network
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

# ===========================
# Network
# ===========================
# Dedicated bridge network isolates the streaming pipeline services
# from other Docker services on the host.

networks:
  streaming-network:
    driver: bridge

# ===========================
# Named Volumes
# ===========================
# Persist Kafka logs, Zookeeper state, Spark scratch data, and Jupyter
# user data across container restarts.

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  spark-worker-data:
  jupyter-data:
